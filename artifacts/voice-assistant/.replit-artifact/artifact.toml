kind = "web"
previewPath = "/"
title = "Voice AI Assistant"
version = "1.0.0"
id = "artifacts/voice-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23822

[services.development]
run = "pnpm --filter @workspace/voice-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voice-assistant", "run", "build" ]
publicDir = "artifacts/voice-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23822"
BASE_PATH = "/"
